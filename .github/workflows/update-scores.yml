name: ⚽ Update Scores After Matches

# Fires ~30 mins after each typical WC 2026 match end time.
# Also triggerable manually from the GitHub Actions tab at any time.
on:
  schedule:
    # Every 15 mins during the tournament (June & July)
    - cron: "*/15 * * 6,7 *"
    # Once daily outside the tournament
    - cron: "0 22 * 1-5,8-12 *"
  workflow_dispatch:        # manual trigger button always available

permissions:
  contents: write             # allow the workflow to commit scores.json back to the repo

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: ⚽ Run score calculator
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python calculate_scores.py

      - name: 💾 Commit scores.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json history.json
          git diff --staged --quiet \
            || git commit -m "🤖 Auto-update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
