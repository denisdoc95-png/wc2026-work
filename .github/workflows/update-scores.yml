name: ⚽ Update Scores After Matches

# Runs every 15 mins during June & July, once daily otherwise.
# Always commits a timestamp to keep the repo active and prevent
# GitHub from throttling the scheduled trigger.
on:
  schedule:
    # Every 15 mins during the tournament (June & July)
    - cron: "*/15 * * 6,7 *"
    # Once daily outside the tournament
    - cron: "0 22 * 1-5,8-12 *"
  workflow_dispatch:        # manual trigger button always available

permissions:
  contents: write             # allow the workflow to commit back to the repo

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: ⚽ Run score calculator
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python calculate_scores.py

      - name: 💾 Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Always write a timestamp — keeps the repo active so GitHub
          # doesn't throttle the scheduled trigger
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last-run.txt
          git add scores.json history.json last-run.txt
          git commit -m "🤖 Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
